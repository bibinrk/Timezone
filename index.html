<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Timezone Converter & Meeting Planner</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <aside class="left-panel" aria-label="Current location">
      <h2>Current Location</h2>
      <p id="current-city" class="current-row">City: --</p>
      <p id="current-timezone" class="current-row">Timezone: --</p>
      <p id="current-coords" class="current-row">Lat, Long: --</p>

      <div class="current-clocks-row">
        <div class="current-time-container">
          <div id="current-date" class="current-date">--</div>
          <div id="current-time" class="current-time-flip"></div>
        </div>
        <div id="current-analog-clock" class="widget-card widget-clock"></div>
      </div>

      <label class="timezone-format-control">Timezone Format
        <select id="timezone-format">
          <option value="gmt">GMT offset</option>
          <option value="utc">UTC offset</option>
          <option value="short">Short name</option>
          <option value="long">Long name</option>
        </select>
      </label>

      <div class="icon-actions">
        <button id="edit-location-btn" class="icon-btn" type="button" aria-label="Edit current time">✎</button>
        <button id="reset-time-btn" class="icon-btn" type="button" aria-label="Back to current time">↺</button>
        <button id="focus-current-btn" class="icon-btn" type="button" aria-label="Go to current location">📍</button>
      </div>

      <div id="edit-location-form" class="edit-form hidden">
        <label><span id="edit-target-label">Current Time</span>
          <input id="edit-time-only" type="text" inputmode="numeric" placeholder="HH:MM:SS" />
        </label>
        <p id="edit-error" class="edit-error"></p>
      </div>

      <div id="current-calendar" class="widget-card widget-calendar"></div>
    </aside>

    <section class="right-panel">
      <div class="search-tabs">
        <button type="button" class="search-tab active" id="tab-search-name">Search by Name</button>
        <button type="button" class="search-tab" id="tab-search-coords">Add by Coordinates</button>
      </div>

      <form id="search-form" class="search-form" autocomplete="off">
        <div class="search-input-wrapper">
          <input id="city-search" type="search" placeholder="Add City to Meeting Planner" required />
          <div id="search-suggestions" class="search-suggestions hidden"></div>
        </div>
      </form>

      <form id="coords-form" class="coords-form hidden" autocomplete="off">
        <input id="lat-input" type="text" inputmode="decimal" placeholder="Latitude" required />
        <input id="lon-input" type="text" inputmode="decimal" placeholder="Longitude" required />
        <button class="search-add-btn" type="submit" aria-label="Add by coordinates" title="Add by coordinates">◎</button>
      </form>

      <section id="meeting-planner" class="meeting-planner" aria-label="Meeting planner">
        <div class="planner-header">
          <div>
            <div class="planner-title-row">
              <h3>Timezone Meeting Planner</h3>
              <div class="planner-legend" aria-label="Timing legend">
                <span><i class="legend-dot ideal"></i>Ideal</span>
                <span><i class="legend-dot manage"></i>Can Manage</span>
                <span><i class="legend-dot bad"></i>Drowsy</span>
              </div>
            </div>
            <div id="planner-best-times" class="planner-best-times"></div>
          </div>

          <div class="planner-controls">
            <button id="add-current-location-btn" class="planner-add-current-btn hidden" type="button">
              + Current Location
            </button>
            <label class="planner-duration-control">Length
              <select id="meeting-duration">
                <option value="30">30 min</option>
                <option value="60" selected>60 min</option>
                <option value="90">90 min</option>
                <option value="120">120 min</option>
              </select>
            </label>
            <label class="planner-map-toggle">
              <input type="checkbox" id="toggle-map-connections" />
              <span>Show Map Paths</span>
            </label>
          </div>
        </div>

        <div id="planner-calendar" class="planner-calendar" role="list"></div>
        <div id="planner-grid" class="planner-grid" aria-label="Meeting availability by hour"></div>
      </section>

      <section class="map-shell" aria-label="Map">
        <div id="world-map" class="world-map"></div>
      </section>

      <section class="below-map" aria-label="City times">
        <div class="below-map-tabs">
          <button type="button" class="below-map-tab active" id="tab-selected-cities">Selected Cities</button>
          <button type="button" class="below-map-tab" id="tab-fixed-cities">Default Cities</button>
        </div>

        <section class="selected-shell" aria-label="Selected cities">
          <ul id="selected-cities" class="selected-cities"></ul>
        </section>

        <section class="fixed-cities hidden" aria-label="Key cities">
          <ul id="fixed-cities-list" class="fixed-cities-list"></ul>
        </section>
      </section>
    </section>
  </main>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="script.js"></script>
</body>
</html>
